name: Build macOS app

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: macos-15
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show build environment
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve app version
        id: version
        run: |
          version="$(./Scripts/version.sh)"
          build_number="$(git rev-list --count HEAD)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "OCTOPILOT_VERSION=$version" >> "$GITHUB_ENV"
          echo "OCTOPILOT_BUILD_NUMBER=$build_number" >> "$GITHUB_ENV"
          echo "Building OctoPilot $version ($build_number)"

      - name: Build release binary
        run: swift build -c release

      - name: Package app bundle
        run: ./Scripts/build-app.sh

      - name: Verify app signature
        run: codesign --verify --deep --strict OctoPilot.app

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctoPilot-${{ steps.version.outputs.version }}-macos
          path: OctoPilot.app
          retention-days: 14

  dist:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import Developer ID signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Resolve app version
        id: version
        run: |
          version="$(./Scripts/version.sh)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "OCTOPILOT_VERSION=$version" >> "$GITHUB_ENV"

      - name: Sign, notarize, staple, and package
        env:
          OCTOPILOT_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          OCTOPILOT_APPLE_ID: ${{ secrets.APPLE_ID }}
          OCTOPILOT_APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          OCTOPILOT_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./Scripts/distribute-app.sh

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          --title "OctoPilot ${{ github.ref_name }}"
          --generate-notes
          "OctoPilot-${{ steps.version.outputs.version }}-macos.zip#OctoPilot for macOS"
